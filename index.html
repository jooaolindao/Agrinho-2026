<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Memória — Agro Sustentável</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f7f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #mem-app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      align-self: flex-start;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a2e10;
      margin-bottom: 4px;
    }

    .subtitulo {
      font-size: 13px;
      color: #7a8a6a;
      margin-bottom: 1.25rem;
    }

    /* Barra superior */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stats {
      display: flex;
      gap: 10px;
    }

    .stat-pill {
      background: #f4f7f0;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #7a8a6a;
      border: 1px solid #e4edd8;
    }

    .stat-pill span {
      font-weight: 600;
      color: #1a2e10;
    }

    .btn-novo {
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid #c8d8b0;
      background: transparent;
      color: #3B6D11;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-novo:hover { background: #f0f8e8; }

    /* Grade de cartas */
    .grade {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* Carta — efeito flip 3D */
    .carta-wrap {
      aspect-ratio: 1 / 1.2;
      perspective: 600px;
      cursor: pointer;
    }

    .carta-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.35s ease;
    }

    .carta-wrap.virada .carta-inner,
    .carta-wrap.acertada .carta-inner {
      transform: rotateY(180deg);
    }

    .carta-frente,
    .carta-verso {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      border: 1px solid #e4edd8;
    }

    /* Lado de trás (fechado) */
    .carta-frente {
      background: #f0f8e8;
      font-size: 26px;
    }

    .carta-frente:hover {
      background: #e4f0d8;
    }

    /* Lado da frente (aberto) */
    .carta-verso {
      transform: rotateY(180deg);
      background: #fff;
    }

    /* Carta acertada fica verde */
    .carta-wrap.acertada .carta-verso {
      background: #EAF3DE;
      border-color: #97C459;
    }

    .carta-icone {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .carta-texto {
      font-size: 11px;
      font-weight: 600;
      color: #1a2e10;
      line-height: 1.3;
    }

    .carta-tipo {
      font-size: 10px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .carta-wrap.acertada .carta-texto { color: #27500A; }

    /* Legenda */
    .legenda {
      margin-top: 1rem;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #7a8a6a;
    }

    .leg-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Tela de vitória */
    .win-box {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
      background: #f8fbf4;
      border: 1px solid #d4e8b8;
      border-radius: 12px;
      margin-top: 1.25rem;
    }

    .win-box.visivel { display: block; }

    .win-emoji { font-size: 52px; margin-bottom: 0.75rem; }

    .win-titulo {
      font-size: 20px;
      font-weight: 700;
      color: #1a2e10;
      margin-bottom: 0.4rem;
    }

    .win-sub {
      font-size: 14px;
      color: #5a6e4a;
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .btn-jogar-de-novo {
      font-size: 14px;
      padding: 10px 28px;
      border-radius: 10px;
      border: 1px solid #c8d8b0;
      background: transparent;
      color: #3B6D11;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-jogar-de-novo:hover { background: #f0f8e8; }
  </style>
</head>
<body>
<div id="mem-app">

  <h1>🌱 Jogo da Memória</h1>
  <p class="subtitulo">Agro Forte, Futuro Sustentável — encontre os pares de práticas e benefícios</p>

  <div class="top-bar">
    <div class="stats">
      <div class="stat-pill">Tentativas: <span id="cnt-tent">0</span></div>
      <div class="stat-pill">Pares: <span id="cnt-pares">0</span>/8</div>
    </div>
    <button class="btn-novo" onclick="iniciar()">↩ Novo jogo</button>
  </div>

  <div class="grade" id="grade"></div>

  <div class="legenda">
    <div class="leg-item">
      <div class="leg-dot" style="background:#3B6D11"></div> Prática agrícola
    </div>
    <div class="leg-item">
      <div class="leg-dot" style="background:#185FA5"></div> Benefício ambiental
    </div>
  </div>

  <div class="win-box" id="win-box">
    <div class="win-emoji" id="win-emoji"></div>
    <p class="win-titulo" id="win-titulo"></p>
    <p class="win-sub" id="win-sub"></p>
    <button class="btn-jogar-de-novo" onclick="iniciar()">↩ Jogar de novo</button>
  </div>

</div>

<script>
  // =============================================
  // DADOS — 8 pares (prática x benefício)
  // =============================================
  var pares = [
    {
      id: 1,
      pratica:   { icone: "🌱", texto: "Plantio direto", tipo: "Prática" },
      beneficio: { icone: "🏔️", texto: "Reduz erosão do solo", tipo: "Benefício" }
    },
    {
      id: 2,
      pratica:   { icone: "💧", texto: "Irrigação por gotejamento", tipo: "Prática" },
      beneficio: { icone: "♻️", texto: "Economiza até 50% de água", tipo: "Benefício" }
    },
    {
      id: 3,
      pratica:   { icone: "🐄", texto: "Integração iLPF", tipo: "Prática" },
      beneficio: { icone: "🌿", texto: "Recupera pastagens degradadas", tipo: "Benefício" }
    },
    {
      id: 4,
      pratica:   { icone: "☀️", texto: "Energia solar na fazenda", tipo: "Prática" },
      beneficio: { icone: "⚡", texto: "Reduz custo de energia", tipo: "Benefício" }
    },
    {
      id: 5,
      pratica:   { icone: "🌳", texto: "Reflorestamento de APPs", tipo: "Prática" },
      beneficio: { icone: "🦋", texto: "Protege a biodiversidade", tipo: "Benefício" }
    },
    {
      id: 6,
      pratica:   { icone: "🐛", texto: "Controle biológico de pragas", tipo: "Prática" },
      beneficio: { icone: "🥦", texto: "Menos agrotóxicos na lavoura", tipo: "Benefício" }
    },
    {
      id: 7,
      pratica:   { icone: "🌾", texto: "Rotação de culturas", tipo: "Prática" },
      beneficio: { icone: "🪱", texto: "Melhora fertilidade do solo", tipo: "Benefício" }
    },
    {
      id: 8,
      pratica:   { icone: "💩", texto: "Compostagem de resíduos", tipo: "Prática" },
      beneficio: { icone: "🌍", texto: "Reduz emissão de metano", tipo: "Benefício" }
    }
  ];

  // =============================================
  // VARIÁVEIS DE CONTROLE
  // =============================================
  var cartas = [];       // lista com todas as 16 cartas
  var viradas = [];      // índices das cartas viradas aguardando comparação
  var acertos = 0;       // quantos pares foram acertados
  var tentativas = 0;    // quantas tentativas foram feitas
  var bloqueado = false; // impede clicar enquanto verifica par

  // Embaralha um array (algoritmo Fisher-Yates)
  function embaralhar(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i];
      a[i] = a[j];
      a[j] = tmp;
    }
    return a;
  }

  // =============================================
  // INICIAR / REINICIAR JOGO
  // =============================================
  function iniciar() {
    viradas = [];
    acertos = 0;
    tentativas = 0;
    bloqueado = false;

    document.getElementById('cnt-tent').textContent = '0';
    document.getElementById('cnt-pares').textContent = '0';
    document.getElementById('win-box').className = 'win-box';

    // Cria as 16 cartas (2 por par)
    var itens = [];
    for (var i = 0; i < pares.length; i++) {
      itens.push({ par: pares[i].id, lado: 'pratica',   dados: pares[i].pratica });
      itens.push({ par: pares[i].id, lado: 'beneficio', dados: pares[i].beneficio });
    }

    cartas = embaralhar(itens);

    // Monta o HTML da grade
    var grade = document.getElementById('grade');
    grade.innerHTML = '';

    for (var c = 0; c < cartas.length; c++) {
      var carta = cartas[c];
      var corTipo = carta.dados.tipo === 'Prática' ? '#3B6D11' : '#185FA5';

      var wrap = document.createElement('div');
      wrap.className = 'carta-wrap';
      wrap.setAttribute('data-index', c);

      // Closure para capturar o índice correto no loop
      wrap.onclick = (function(idx) {
        return function() { clicar(idx); };
      })(c);

      wrap.innerHTML =
        '<div class="carta-inner">' +
          '<div class="carta-frente">🌿</div>' +
          '<div class="carta-verso">' +
            '<div class="carta-icone">' + carta.dados.icone + '</div>' +
            '<div class="carta-texto">' + carta.dados.texto + '</div>' +
            '<div class="carta-tipo" style="color:' + corTipo + '">' + carta.dados.tipo + '</div>' +
          '</div>' +
        '</div>';

      grade.appendChild(wrap);
    }
  }

  // =============================================
  // CLICAR EM UMA CARTA
  // =============================================
  function clicar(idx) {
    if (bloqueado) return; // não deixa clicar se está verificando par
    var wrap = document.querySelector('[data-index="' + idx + '"]');
    if (!wrap) return;
    if (wrap.classList.contains('virada'))  return; // já virada
    if (wrap.classList.contains('acertada')) return; // já acertada
    if (viradas.length >= 2) return; // já tem 2 viradas esperando

    // Vira a carta
    wrap.classList.add('virada');
    viradas.push(idx);

    // Se virou 2, verifica par após pequena pausa
    if (viradas.length === 2) {
      tentativas++;
      document.getElementById('cnt-tent').textContent = tentativas;
      bloqueado = true;
      setTimeout(function() { verificar(); }, 900);
    }
  }

  // =============================================
  // VERIFICAR SE AS 2 CARTAS FORMAM PAR
  // =============================================
  function verificar() {
    var a = cartas[viradas[0]];
    var b = cartas[viradas[1]];

    var wrapA = document.querySelector('[data-index="' + viradas[0] + '"]');
    var wrapB = document.querySelector('[data-index="' + viradas[1] + '"]');

    // Par válido: mesmo id E lados diferentes (prática + benefício)
    if (a.par === b.par && a.lado !== b.lado) {
      wrapA.classList.remove('virada');
      wrapA.classList.add('acertada');
      wrapB.classList.remove('virada');
      wrapB.classList.add('acertada');
      acertos++;
      document.getElementById('cnt-pares').textContent = acertos;

      // Verificar vitória
      if (acertos === pares.length) {
        setTimeout(function() { mostrarVitoria(); }, 400);
      }
    } else {
      // Errou — vira de volta
      wrapA.classList.remove('virada');
      wrapB.classList.remove('virada');
    }

    viradas = [];
    bloqueado = false;
  }

  // =============================================
  // TELA DE VITÓRIA
  // =============================================
  function mostrarVitoria() {
    var emoji, titulo, sub;

    if (tentativas <= 10) {
      emoji  = '🏆';
      titulo = 'Memória de campeão!';
      sub    = 'Você encontrou todos os 8 pares em apenas ' + tentativas + ' tentativas. Excelente!';
    } else if (tentativas <= 16) {
      emoji  = '🌾';
      titulo = 'Muito bem!';
      sub    = 'Todos os pares encontrados em ' + tentativas + ' tentativas. Bom desempenho!';
    } else {
      emoji  = '🌱';
      titulo = 'Conseguiu!';
      sub    = 'Todos os pares encontrados em ' + tentativas + ' tentativas. Treine mais e melhore!';
    }

    document.getElementById('win-emoji').textContent   = emoji;
    document.getElementById('win-titulo').textContent  = titulo;
    document.getElementById('win-sub').textContent     = sub;
    document.getElementById('win-box').className       = 'win-box visivel';
  }

  // Inicia o jogo ao carregar a página
  iniciar();
</script>
</body>
</html>
